<table>
  <thead>
    <tr>
      <th>Year</th>
      <th>Month</th>
      @for (category of categoryKeys; track $index) {
        <th>{{ category }}</th>
      }
      <th>Total</th>
    </tr>
  </thead>
  <tbody>
  @for (row of monthlySummary; track $index) {
    <tr>
      <td>{{ row.year }}</td>
      <td>{{ row.month }}</td>

      @for (category of categoryKeys; track $index) {
        <td>{{ row.categoryTotals[category] ?? 0 }}</td>
      }

      <td>{{ row.totalExpenses }}</td>
    </tr>
  }
</tbody>
</table>
